name: Release

on:
  push:
    tags:
      - 'v*'

# Cross-compile for Linux + macOS (amd64 and arm64), publish a GitHub Release
# with the 8 binaries plus a checksums.txt. The `control` binary is built
# with DEFAULT_RELAY hardcoded via ldflags so it points straight at your
# VPS — edit the value below BEFORE tagging the first release.

env:
  DEFAULT_RELAY: wss://relay.nbardavid.dev

jobs:
  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -e
          VERSION="${GITHUB_REF#refs/tags/}"
          mkdir -p dist

          # control: client binary. ldflags injects the version + the relay URL.
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.defaultRelay=${DEFAULT_RELAY}" \
            -o "dist/control-${GOOS}-${GOARCH}" \
            ./cmd/control

          # control-relay: server binary. No defaultRelay needed on the server side.
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/control-relay-${GOOS}-${GOARCH}" \
            ./cmd/control-relay

      - uses: actions/upload-artifact@v4
        with:
          name: bins-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 1

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA-256 checksums
        run: |
          cd dist
          sha256sum control-* control-relay-* > checksums.txt
          cat checksums.txt

      - name: Copy install.sh to release assets
        run: cp install.sh dist/install.sh

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/control-*
            dist/control-relay-*
            dist/checksums.txt
            dist/install.sh
          generate_release_notes: true
          draft: false
          prerelease: false
